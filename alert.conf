# ─────────────────────────────────────────────────────────────────────────────
#  LFTG Platform — Configuration des alertes automatiques
#  Modifiable depuis l'interface admin : Administration > Alertes système
# ─────────────────────────────────────────────────────────────────────────────

# ─── Email ───────────────────────────────────────────────────────────────────
# Adresse email qui recevra les alertes (laisser vide pour désactiver)
ALERT_EMAIL=""

# Mot de passe admin pour l'API (utilisé pour envoyer les emails via le backend)
ADMIN_PASSWORD="admin123"

# ─── Telegram ────────────────────────────────────────────────────────────────
# Token du bot Telegram (obtenu via @BotFather)
# Laisser vide pour désactiver
ALERT_TELEGRAM_TOKEN=""

# Chat ID Telegram (votre ID personnel ou celui d'un groupe)
# Obtenir via @userinfobot ou https://api.telegram.org/bot<TOKEN>/getUpdates
ALERT_TELEGRAM_CHAT_ID=""

# ─── Paramètres ──────────────────────────────────────────────────────────────
# Délai minimum entre deux alertes du même type (en secondes)
# 300 = 5 minutes, 3600 = 1 heure
ALERT_COOLDOWN="300"
