# ─────────────────────────────────────────────────────────────────────────────
#  LFTG Platform — Configuration des sauvegardes
#  Fichier: /home/ubuntu/lftg-platform/backup.conf
# ─────────────────────────────────────────────────────────────────────────────

# ─── Google Drive ─────────────────────────────────────────────────────────────
#
#  Pour activer la synchronisation Google Drive :
#  1. Passer GDRIVE_ENABLED à "true"
#  2. Exécuter le script de connexion : bash /home/ubuntu/lftg-platform/lftg-gdrive-setup.sh
#  3. Indiquer le chemin de destination dans GDRIVE_PATH (ex: "Backups/LFTG/Production")
#
#  Le nom du remote rclone (GDRIVE_REMOTE) doit correspondre à celui choisi
#  lors de la configuration (par défaut: lftg_gdrive).

GDRIVE_ENABLED="false"

# Nom du remote rclone (configuré via lftg-gdrive-setup.sh)
GDRIVE_REMOTE="lftg_gdrive"

# Chemin de destination dans votre Google Drive
# Exemples :
#   GDRIVE_PATH="Backups/LFTG"
#   GDRIVE_PATH="Mon Drive/Sauvegardes/Serveur Production"
#   GDRIVE_PATH="LFTG/Backups/2026"
GDRIVE_PATH="Backups/LFTG"

# ─── Rétention locale ────────────────────────────────────────────────────────
#
#  Nombre de jours de conservation des backups locaux (défaut: 7)
#  Les fichiers plus anciens sont supprimés automatiquement.

LOCAL_RETENTION_DAYS="7"
