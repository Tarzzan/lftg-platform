name: Update Map — LFTG Platform
on:
  push:
    branches: [develop, main]
  workflow_dispatch:

jobs:
  update-map:
    name: Régénérer et déployer la carte de progression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Générer le data.js
        run: |
          python3 scripts/generate-map-data.py > data.js
          echo "✅ data.js généré ($(wc -c < data.js) bytes)"
          head -1 data.js

      - name: Déployer le data.js sur le VPS via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 51.210.15.92
          username: ubuntu
          password: ${{ secrets.VPS_PASSWORD }}
          source: data.js
          target: /home/ubuntu/lftg-map/
