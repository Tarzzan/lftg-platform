name: CI — LFTG Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'

jobs:
  # ─── Lint & Type check ───────────────────────────────────────────────────
  lint:
    name: Lint & Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @lftg/core prisma:generate

      - name: Lint backend
        run: pnpm --filter @lftg/backend lint
        continue-on-error: true

      - name: Lint frontend
        run: pnpm --filter @lftg/frontend lint
        continue-on-error: true

      - name: Type check backend
        run: pnpm --filter @lftg/backend exec tsc --noEmit
        continue-on-error: true

      - name: Type check frontend
        run: pnpm --filter @lftg/frontend exec tsc --noEmit
        continue-on-error: true

  # ─── Unit tests ──────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @lftg/core prisma:generate

      - name: Run backend tests
        run: pnpm --filter @lftg/backend test
        env:
          DATABASE_URL: 'postgresql://test:test@localhost:5432/lftg_test'
          JWT_SECRET: 'test-secret-for-ci'
          JWT_EXPIRES_IN: '1h'

      - name: Upload test coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ─── Build ───────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @lftg/core prisma:generate

      - name: Build backend
        run: pnpm --filter @lftg/backend build
        env:
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/lftg'
          JWT_SECRET: 'build-placeholder'
          JWT_EXPIRES_IN: '1h'

      - name: Build frontend
        run: pnpm --filter @lftg/frontend build
        env:
          NEXT_PUBLIC_API_URL: 'https://api.lftg.fr/api/v1'

  # ─── Docker build ────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.lftg.fr/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max
