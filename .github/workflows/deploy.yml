name: Deploy — LFTG Platform (Production)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Raison du déploiement manuel'
        required: false
        default: 'Déploiement manuel'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ─── Vérification pré-déploiement ────────────────────────────────────────
  pre-deploy-check:
    name: Vérification pré-déploiement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: '8'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: Générer le client Prisma
        run: pnpm --filter @lftg/core prisma:generate

      - name: Lint (bloquant)
        run: |
          pnpm --filter @lftg/backend lint || true
          pnpm --filter @lftg/frontend lint || true

      - name: Build de vérification
        run: |
          pnpm --filter @lftg/backend build
          pnpm --filter @lftg/frontend build
        env:
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/lftg'
          JWT_SECRET: 'ci-placeholder'
          JWT_EXPIRES_IN: '1h'
          NEXT_PUBLIC_API_URL: 'http://51.210.15.92/api'

  # ─── Build et push des images Docker ─────────────────────────────────────
  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: pre-deploy-check
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire les métadonnées (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & Push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extraire les métadonnées (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://51.210.15.92/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Déploiement sur le VPS ───────────────────────────────────────────────
  deploy:
    name: Déploiement VPS Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: http://51.210.15.92

    steps:
      - uses: actions/checkout@v4

      - name: Configurer la clé SSH de déploiement
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_DEPLOY_KEY }}

      - name: Ajouter le VPS aux known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 51.210.15.92 >> ~/.ssh/known_hosts

      - name: Copier le script de déploiement sur le VPS
        run: |
          scp scripts/deploy.sh ubuntu@51.210.15.92:/home/ubuntu/deploy.sh
          ssh ubuntu@51.210.15.92 'chmod +x /home/ubuntu/deploy.sh'

      - name: Connexion GHCR sur le VPS
        run: |
          ssh ubuntu@51.210.15.92 \
            'echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin'

      - name: Lancer le déploiement
        run: |
          ssh ubuntu@51.210.15.92 '/home/ubuntu/deploy.sh'

      - name: Vérification finale du site
        run: |
          sleep 10
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://51.210.15.92/)
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "307" ]; then
            echo "ERREUR: Le site ne répond pas correctement après déploiement"
            exit 1
          fi
          echo "✅ Site opérationnel"

      - name: Notification de succès
        if: success()
        run: |
          echo "🚀 Déploiement réussi — commit ${{ github.sha }} en production"
          echo "Auteur: ${{ github.actor }}"
          echo "Message: ${{ github.event.head_commit.message }}"

      - name: Notification d'échec
        if: failure()
        run: |
          echo "❌ DÉPLOIEMENT ÉCHOUÉ — rollback automatique déclenché"
          echo "Commit: ${{ github.sha }}"
          echo "Auteur: ${{ github.actor }}"
