name: Release — LFTG Platform

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: '8'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @lftg/core prisma:generate

      - name: Build all packages
        run: |
          pnpm --filter @lftg/backend build
          pnpm --filter @lftg/frontend build
        env:
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/lftg'
          JWT_SECRET: 'release-placeholder'
          JWT_EXPIRES_IN: '1h'
          NEXT_PUBLIC_API_URL: 'https://api.lftg.fr/api/v1'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build & push backend image (versioned)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image (versioned)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.lftg.fr/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --pretty=format:"- %s (%h)" | head -20)
          else
            CHANGELOG=$(git log --oneline --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LFTG Platform ${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🦜 LFTG Platform ${{ steps.version.outputs.VERSION }}

            ### Changements
            ${{ steps.changelog.outputs.CHANGELOG }}

            ### Images Docker
            ```bash
            docker pull ghcr.io/${{ github.repository }}/backend:${{ steps.version.outputs.VERSION }}
            docker pull ghcr.io/${{ github.repository }}/frontend:${{ steps.version.outputs.VERSION }}
            ```

            ### Démarrage rapide
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd lftg-platform
            cp .env.example .env
            docker-compose up -d
            ```

            ---
            *Signé: William MERI — La Ferme Tropicale de Guyane*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          generate_release_notes: false
