name: Branch Protection — Vérification PR

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

jobs:
  # ─── Vérification que la PR vient bien de develop ────────────────────────
  check-source-branch:
    name: Vérification de la branche source
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'
    steps:
      - name: Vérifier que la PR vient de develop ou d'une branche hotfix
        run: |
          SOURCE="${{ github.head_ref }}"
          echo "Branche source: $SOURCE"
          if [[ "$SOURCE" != "develop" && "$SOURCE" != hotfix/* && "$SOURCE" != release/* ]]; then
            echo "❌ ERREUR: Les merges vers main doivent venir de 'develop', 'hotfix/*' ou 'release/*'"
            echo "Branche source actuelle: $SOURCE"
            exit 1
          fi
          echo "✅ Branche source valide: $SOURCE"

  # ─── Lint et build obligatoires avant merge ──────────────────────────────
  required-checks:
    name: Vérifications obligatoires
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: '8'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: Générer le client Prisma
        run: pnpm --filter @lftg/core prisma:generate

      - name: Vérification TypeScript backend
        run: pnpm --filter @lftg/backend exec tsc --noEmit
        env:
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/lftg'
          JWT_SECRET: 'ci-check'
          JWT_EXPIRES_IN: '1h'
        continue-on-error: true

      - name: Vérification TypeScript frontend
        run: pnpm --filter @lftg/frontend exec tsc --noEmit
        env:
          NEXT_PUBLIC_API_URL: 'http://51.210.15.92/api'
        continue-on-error: true

      - name: Build de validation
        run: |
          pnpm --filter @lftg/backend build
          pnpm --filter @lftg/frontend build
        env:
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/lftg'
          JWT_SECRET: 'ci-check'
          JWT_EXPIRES_IN: '1h'
          NEXT_PUBLIC_API_URL: 'http://51.210.15.92/api'
