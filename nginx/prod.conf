server {
    listen 80;
    server_name 51.210.15.92;
    client_max_body_size 50M;
    # Resolver Docker pour résolution DNS dynamique
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Cartographie architecture LFTG (proxy vers serveur Python port 8080)
    location /map {
        proxy_pass http://172.18.0.1:8080/;
        proxy_set_header Host $host;
    }

    # Frontend Next.js — utilise le nom de service Docker
    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location /health {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
    }

    location /docs {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
    }

    location /api {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream/socket.io;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    location /uploads {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
